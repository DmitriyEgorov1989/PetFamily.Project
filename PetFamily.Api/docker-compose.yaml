services:
   postgres:
     container_name: petFamily_db_pg
     image: postgres
     restart: always
     environment:
       POSTRGRES_DB: pet_family
       POSTGRES_USER: user
       POSTGRES_PASSWORD: user
     ports: 
      - 5432:5432
     volumes:
      - postgres-data:/var/lib/postgres/data
  
   seq:
    image: datalust/seq
    container_name: seq_pet_family
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:5341"
      - "9090:80"
   
   minio:
    image: minio/minio
    container_name: minio_pet_family
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_DEFAULT_BUCKETS=photos
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    volumes:
      - minio-volume:/data



volumes:
  postgres-data:
  minio-volume: